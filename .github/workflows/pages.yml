name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths: ['public/**', '.github/workflows/pages.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Inject Supabase config
        run: |
          sed -i "s#document.currentScript?.dataset?.sbUrl || ''#document.currentScript?.dataset?.sbUrl || '${{ secrets.SUPABASE_URL }}'#g" public/index.html
          sed -i "s#document.currentScript?.dataset?.sbKey || ''#document.currentScript?.dataset?.sbKey || '${{ secrets.SUPABASE_ANON_KEY }}'#g" public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
