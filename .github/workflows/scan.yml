name: DS-Alerts Scanner

on:
  schedule:
    - cron: '0,15,30,45 * * * *'  # 每15分钟
  workflow_dispatch:  # 手动触发

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install nodemailer

      - name: Run Scanner
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: node src/scanner.mjs

  # 部署静态仪表盘到 GitHub Pages
  deploy:
    needs: scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Supabase config into dashboard
        run: |
          sed -i "s|document.currentScript?.dataset?.sbUrl || ''|document.currentScript?.dataset?.sbUrl || '${{ secrets.SUPABASE_URL }}'|g" public/index.html
          sed -i "s|document.currentScript?.dataset?.sbKey || ''|document.currentScript?.dataset?.sbKey || '${{ secrets.SUPABASE_ANON_KEY }}'|g" public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
