name: Signal Scanner Cron

on:
  schedule:
    - cron: '0,15,30,45 * * * *'  # 每15分钟
  workflow_dispatch:  # 支持手动触发

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Scanner
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SCAN_URL }}/api/scan")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Scan failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          # 提取信号数
          SIGNALS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('signals', 0))" 2>/dev/null || echo "?")
          echo "Signals found: $SIGNALS"
